<div id="version-modal" class="fixed inset-0 bg-black bg-opacity-60 flex items-center justify-center z-50 hidden">
    <div class="bg-gray-900 border border-gray-800 rounded-lg p-6 w-full max-w-md mx-4">
        <div class="flex items-center justify-between mb-4">
            <h2 class="text-lg font-semibold">Add Version</h2>
            <button onclick="closeVersionModal()" class="text-gray-500 hover:text-gray-100 text-xl">✕</button>
        </div>
        <form method="post" action="{% url 'content:add_version' item.slug %}" enctype="multipart/form-data" id="version-form">
            {% csrf_token %}
            {% for field in version_form %}
                <div class="mb-4">
                    <label class="block text-sm text-gray-400 mb-1">{{ field.label }}</label>
                    {{ field }}
                    {% if field.errors %}
                        <p class="text-red-400 text-xs mt-1">{{ field.errors.0 }}</p>
                    {% endif %}
                </div>
            {% endfor %}
            <div class="flex justify-end gap-3">
                <button type="button" onclick="closeVersionModal()" class="text-gray-400 hover:text-gray-100 text-sm px-4 py-2">Cancel</button>
                <button type="submit" class="bg-pink-300 text-gray-900 px-6 py-2 rounded font-bold hover:bg-pink-200 text-sm">Upload</button>
            </div>
        </form>
    </div>
</div>

<script>
    function openVersionModal() {
        document.getElementById('version-modal').classList.remove('hidden');
    }
    function closeVersionModal() {
        document.getElementById('version-modal').classList.add('hidden');
    }
    document.getElementById('version-modal').addEventListener('click', function(e) {
        if (e.target === this) closeVersionModal();
    });

    document.getElementById('version-form').addEventListener('submit', function(e) {
        const fileInput = document.querySelector('input[name="file"]');
        const maxSize = 500 * 1024 * 1024;

        if (fileInput.files.length > 0 && fileInput.files[0].size > maxSize) {
            e.preventDefault();
            alert('File is too large. Maximum size is 500MB.');
        }
    });
</script>
